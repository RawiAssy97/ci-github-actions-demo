name: Scheduled Workflow

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: #Just to Run Manually  

jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print cron message
        run: echo "Scheduled build completed successfully!"
